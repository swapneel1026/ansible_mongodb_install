---
- name: Add MongoDB GPG key
  get_url:
    url: https://pgp.mongodb.com/server-7.0.asc
    dest: /tmp/mongodb-server-7.0.asc
    mode: "0644"
  when: ansible_facts['os_family'] == "Debian"

- name: Dearmor MongoDB key
  shell: |
    gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg /tmp/mongodb-server-7.0.asc
  args:
    creates: /usr/share/keyrings/mongodb-server-7.0.gpg
  when: ansible_facts['os_family'] == "Debian"

- name: Add MongoDB repository
  apt_repository:
    repo: "deb [ signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu noble/mongodb-org/7.0 multiverse"
    state: present
    filename: mongodb-org-7.0
  when: ansible_facts['os_family'] == "Debian"

- name: Install MongoDB
  apt:
    name: mongodb-org
    state: present
    update_cache: yes
  when: ansible_facts['os_family'] == "Debian"

- name: Skip MongoDB installation on RHEL
  debug:
    msg: "MongoDB installation not configured for RHEL yet"
  when: ansible_facts['os_family'] == "RedHat"
